name: Deploy opzet/afname app to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build & Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Inject build info
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          BUILD_DATE="$(date -u +'%Y-%m-%d %H:%M UTC')"
          PR="${PR_NUMBER:-}"
          PR_BADGE=""
          if [ -n "$PR" ]; then PR_BADGE="PR#${PR} · "; fi
          INFO="${PR_BADGE}${BRANCH} · ${SHA_SHORT} · ${BUILD_DATE}"
          # placeholder __BUILD_INFO__ in opzet_afname.html wordt door deze stap vervangen
          sed -i "s|__BUILD_INFO__|${INFO}|g" opzet_afname.html
          echo "Injected build info: ${INFO}"
      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "/"
          api_location: ""
          output_location: ""
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR preview
    steps:
      - name: Close PR
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
